mc:
  workflow:
    max_review_iterations: 9
    defaults:
      tool: codex
      reasoning: low
      fast: false
    stages:
      planning:
        reasoning: high
      review:
        reasoning: high
    validation:
      max_attempts_per_stage: 5
      commands:
        - pnpm run typecheck
        - pnpm run test:server
        - pnpm run test:spec
