mc:
  workflow:
    max_review_iterations: 5

    defaults:
      reasoning: low
      fast: false

    stages:
      planning:
        reasoning: high
        fast: false
      execution:
        reasoning: low
        fast: true
      review:
        reasoning: high
        fast: false
      repair:
        reasoning: low
        fast: true
      archive:
        reasoning: low
        fast: true
